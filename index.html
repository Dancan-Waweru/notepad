	<main class="main">
		<div class="concept">
		<h1>Ophelia</h1>
		<hr>
		<p id="p"></p>
		</div>
	</main>

	<script>
		let p=document.getElementById('p');

let sentence=`The name comes from Greek roots: ophelos, meaning “help” or “benefit.” On paper it means “the one who brings help.”
But the world remembers it differently because Shakespeare gave the name to a girl who loved too deeply and was crushed by the weight of everyone else’s madness. So the name picked up this ghost-like aura: fragile beauty, emotional depth, someone drifting between clarity and chaos.`;

let index = 0;
let a = "";

function songs_of_solomon() {
    if (index >= sentence.length) {
        clearInterval(runsequence);
        return "songs of solomon complete";
    }
    
    a = a+sentence[index];
    let b = "●";
    p.textContent = a + b;

    index++;  
}

let runsequence = setInterval(songs_of_solomon, 50);
	</script>
